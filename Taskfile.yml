version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  LDFLAGS: -s -w -X main.version={{.VERSION}}

tasks:
  build:
    desc: Build the vellum binary into bin/ (no SPA embed — see build-full)
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o bin/vellum ./cmd/vellum

  build-web:
    desc: Build the SPA into web/dist
    dir: web
    cmds:
      - npm run build

  build-full:
    desc: Build the SPA and embed it into the binary
    deps: [build-web]
    cmds:
      - go build -trimpath -tags embedspa -ldflags "{{.LDFLAGS}}" -o bin/vellum ./cmd/vellum

  run:
    desc: Run vellum locally
    cmds:
      - go run -ldflags "{{.LDFLAGS}}" ./cmd/vellum

  inspector:
    desc: 'Debug the MCP tools in the MCP Inspector (stdio, no auth) — UI opens at http://localhost:6274'
    env:
      VELLUM_VAULT_PATH: '{{.VELLUM_VAULT_PATH | default "testdata/vault"}}'
      VELLUM_CURATOR: "on"
      VELLUM_INIT_STRUCTURE: "false"
    cmds:
      - |
        echo "MCP Inspector → http://localhost:6274"
        echo "Transport : stdio (spawns 'vellum --mcp-stdio', no OAuth needed)"
        echo "Vault     : $VELLUM_VAULT_PATH"
        echo "Tools     : 15 core + 6 curator (VELLUM_CURATOR=on)"
        echo ""
        npx -y @modelcontextprotocol/inspector go run -ldflags "{{.LDFLAGS}}" ./cmd/vellum --mcp-stdio

  inspector-http:
    desc: 'MCP Inspector for the Streamable HTTP transport — start a server first (e.g. AUTH_ENABLED=false task run)'
    cmds:
      - |
        echo "MCP Inspector → http://localhost:6274"
        echo "Transport : Streamable HTTP"
        echo "MCP URL   : http://localhost:{{.PORT | default \"8080\"}}/mcp"
        echo "            (add a Bearer token if the server has AUTH_ENABLED=true)"
        echo ""
        npx -y @modelcontextprotocol/inspector

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  docker-build:
    desc: Build the Docker image (vellum:local)
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t vellum:local .

  docker-run:
    desc: Build and start via docker compose (dev overlay builds locally)
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

  docker-stop:
    desc: Stop the compose stack
    cmds:
      - docker compose down

  e2e:
    desc: Start compose with the fixture vault for Chrome DevTools MCP e2e runs (docs/e2e.md)
    cmds:
      - mkdir -p vault
      - rsync -a --delete testdata/vault/ vault/
      - docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
      - echo 'e2e stack ready on http://localhost:{{.VELLUM_PORT | default "8090"}} — scenarios in docs/e2e.md'
